<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 640 560"
  role="img"
  aria-labelledby="iosclub-doing-title iosclub-doing-desc"
>
  <title id="iosclub-doing-title">iOS Club 社員一起製作 App</title>
  <desc id="iosclub-doing-desc">
    社員圍繞著筆電與手機學習程式設計、製作 App，並以獎盃象徵參與競賽。
  </desc>

  <defs>
    <linearGradient id="screen-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc" />
      <stop offset="1" stop-color="#e9f0f7" />
    </linearGradient>
    <linearGradient id="app-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecadad" />
      <stop offset="1" stop-color="#8098b5" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <circle cx="320" cy="290" r="245" fill="#f1f5f9" />
  <circle cx="70" cy="288" r="20" fill="#fff5d1" />
  <circle cx="570" cy="288" r="20" fill="#ecadad" opacity="0.55" />

  <!-- 程式碼徽章 -->
  <g>
    <rect
      x="73"
      y="78"
      width="110"
      height="92"
      rx="22"
      fill="#fff5d1"
      stroke="#445484"
      stroke-width="5"
    />
    <path
      d="m111 108-16 16 16 16m34-32 16 16-16 16m-10-43-16 54"
      fill="none"
      stroke="#4771a3"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="7"
    />
  </g>

  <!-- 競賽獎盃 -->
  <g transform="translate(451 61)">
    <path
      d="M32 16h58v23c0 32-15 51-29 58-14-7-29-26-29-58V16Z"
      fill="#f7c66d"
      stroke="#445484"
      stroke-linejoin="round"
      stroke-width="5"
    />
    <path
      d="M32 30H14c0 25 11 39 29 42M90 30h18c0 25-11 39-29 42"
      fill="none"
      stroke="#445484"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="5"
    />
    <path
      d="m61 31 6 12 14 2-10 10 2 14-12-7-13 7 3-14-11-10 15-2 6-12Z"
      fill="#fff5d1"
    />
  </g>

  <!-- 筆電 -->
  <g transform="translate(13)">
    <rect
      x="113"
      y="133"
      width="388"
      height="278"
      rx="25"
      fill="#445484"
    />
    <rect
      x="128"
      y="148"
      width="358"
      height="246"
      rx="14"
      fill="url(#screen-gradient)"
    />
    <rect x="128" y="148" width="358" height="39" rx="14" fill="#dce6f0" />
    <path d="M128 173h358" stroke="#c1cfdd" stroke-width="2" />
    <circle cx="151" cy="168" r="6" fill="#ecadad" />
    <circle cx="172" cy="168" r="6" fill="#f3bd63" />
    <circle cx="193" cy="168" r="6" fill="#77bea9" />

    <!-- 程式碼視窗 -->
    <rect x="150" y="211" width="202" height="135" rx="15" fill="#fff" />
    <path
      d="m202 253-27 23 27 23m75-46 27 23-27 23m-20-63-34 80"
      fill="none"
      stroke="#4771a3"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="10"
    />
    <rect x="169" y="318" width="61" height="8" rx="4" fill="#ecadad" />
    <rect x="239" y="318" width="88" height="8" rx="4" fill="#b3c4d6" />

    <!-- App 預覽 -->
    <rect x="374" y="207" width="86" height="141" rx="19" fill="#fff" />
    <rect x="383" y="221" width="68" height="70" rx="15" fill="url(#app-gradient)" />
    <path
      d="M403 258c14-25 31-25 31 0 0 16-15 23-15 23s-16-7-16-23Z"
      fill="#fff"
      opacity="0.9"
    />
    <rect x="389" y="307" width="56" height="7" rx="3.5" fill="#8098b5" />
    <rect x="397" y="323" width="40" height="7" rx="3.5" fill="#c6d3df" />

    <!-- 筆電底座 -->
    <path
      d="M79 411h456l-29 38H108l-29-38Z"
      fill="#8098b5"
      stroke="#445484"
      stroke-linejoin="round"
      stroke-width="5"
    />
    <path d="M267 411h80l-10 13h-60l-10-13Z" fill="#dce6f0" />
  </g>

  <!-- 左側社員 -->
  <g>
    <circle cx="145" cy="390" r="29" fill="#d89672" />
    <path
      d="M113 386c2-33 17-49 38-43 17 4 23 20 22 38-12-5-22-15-26-25-5 17-16 26-34 30Z"
      fill="#253b62"
    />
    <path
      d="M69 518c2-71 30-108 76-108s74 37 76 108H69Z"
      fill="#ecadad"
    />
    <path
      d="M113 423c11 20 54 39 87 43"
      fill="none"
      stroke="#d89672"
      stroke-linecap="round"
      stroke-width="16"
    />
    <circle cx="204" cy="467" r="9" fill="#d89672" />
  </g>

  <!-- 中間社員 -->
  <g>
    <circle cx="320" cy="418" r="31" fill="#bd735c" />
    <path
      d="M287 416c-1-34 14-52 37-51 20 1 31 19 29 43-15-3-28-12-36-25-4 17-14 28-30 33Z"
      fill="#202f4c"
    />
    <path
      d="M246 523c5-63 31-94 74-94s69 31 74 94H246Z"
      fill="#8098b5"
    />
    <path d="m307 447 13 18 14-18" fill="none" stroke="#fff" stroke-linecap="round" stroke-width="6" />
  </g>

  <!-- 右側社員 -->
  <g>
    <circle cx="492" cy="390" r="29" fill="#e3a17d" />
    <path
      d="M462 386c-2-28 10-48 32-48 23 0 37 19 33 48-13-6-24-17-31-30-5 16-16 26-34 30Z"
      fill="#5c3b48"
    />
    <path
      d="M418 518c2-71 29-108 74-108 46 0 74 37 77 108H418Z"
      fill="#f3bd63"
    />
    <path
      d="M525 424c-13 19-55 38-88 42"
      fill="none"
      stroke="#e3a17d"
      stroke-linecap="round"
      stroke-width="16"
    />
    <circle cx="434" cy="467" r="9" fill="#e3a17d" />
  </g>

  <!-- 分享與連結 -->
  <path
    d="M206 467c31 17 70 25 114 25s83-8 114-25"
    fill="none"
    stroke="#445484"
    stroke-dasharray="6 13"
    stroke-linecap="round"
    stroke-width="5"
  />
  <circle cx="320" cy="492" r="11" fill="#445484" />
</svg>
